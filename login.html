<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A game panel developed by a beginner developer">
    <meta name="keywords" content="html, css, javascript, web development, panel sample, free panel source">
    <meta name="author" content="Edzel Reyna">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#000000">
    <meta name="google-site-verification" content="roH5GmFGiRAwa_dRFJgjlHBEboL826F-Sb9IXlFu8-Y" />
    
    <link rel="stylesheet" href="https://unpkg.com/cybercore-css@latest/dist/cybercore.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="icon" type="image/png" href="assets/images/Auth.png">
    
    <title>Authra Login</title>
</head>
<body>

<!-- =========================
     LOGIN VIEW
========================= -->
<div id="loginView" class="loginPage">
    <div class="loginCard">
        <h2>Admin Login</h2>

        <form id="loginForm">
            <input id="username" type="text" placeholder="Username">
            <input id="password" type="password" placeholder="Password">

            <button type="submit">Login</button>
        </form>

        <div id="message"></div>

        <p style="margin-top: 12px; font-size: 12px; color: #aaa;">
            Developer?
            <a href="#" id="openSuperadminLogin">Create admin</a>
            instead.
        </p>

        <div class="copyright">
            © 2026 Authra. All rights reserved.
        </div>
    </div>
</div>

<!-- =========================
     SUPERADMIN LOGIN VIEW
========================= -->
<div id="superadminLoginView" class="loginPage" style="display:none;">
    <div class="loginCard">
        <h2>Superadmin Login</h2>

        <input id="saUsername" type="text" placeholder="Username">
        <input id="saPassword" type="password" placeholder="Password">

        <div class="buttonGroup">
            <button id="superadminLoginBtn">Login</button>
            <button class="textButton" id="backToLogin">Back</button>
        </div>

        <p id="saLoginMsg"></p>
    </div>
</div>

<!-- =========================
     CREATE ADMIN VIEW
========================= -->
<div id="createAdminView" class="loginPage" style="display:none;">
    <div class="loginCard">
        <h2>Create Admin</h2>

        <input id="newAdminUser" type="text" placeholder="Username">
        <input id="newAdminPass" type="password" placeholder="Password">

        <div class="formGroup">
            <label for="newAdminRole">Role</label>
            <select id="newAdminRole">
                <option value="admin">Admin</option>
                <option value="moderator">Moderator</option>
            </select>
        </div>

        <div class="buttonGroup">
            <button id="createAdminBtn">Create</button>
            <button class="dangerButton" id="logoutSuperadmin">Logout</button>
        </div>

        <p id="createMsg"></p>
    </div>
</div>

<!-- =========================
     SCRIPTS
========================= -->
<script src="assets/js/api.js"></script>
<script src="assets/js/login.js"></script>
<script src="assets/js/ui.js"></script>

</body>
</html>
