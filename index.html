<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A game panel developed by a beginner developer"
    />
    <meta
      name="keywords"
      content="html, css, javascript, web development, panel sample, free panel source"
    />
    <meta name="author" content="Edzel Reyna" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="google-site-verification"
      content="roH5GmFGiRAwa_dRFJgjlHBEboL826F-Sb9IXlFu8-Y"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="icon" type="image/png" href="assets/images/Auth.png" />

    <title>Authra Panel</title>
  </head>
  <body>
    <div class="app">
      <div class="menu-toggle" onclick="toggleSidebar()">☰</div>

      <!-- SIDEBAR -->
      <aside class="sidebar" id="sidebar">
        <h2>ADMIN PANEL</h2>
        <ul>
          <div class="admin-context">
            <p id="adminName">Logged in as:</p>
            <p id="adminRole">Role:</p>
          </div>

          <li onclick="showSection('dashboard')">DASHBOARD</li>
          <li onclick="showSection('keys')">LICENSE KEYS</li>
          <li onclick="showSection('users')">USERS</li>
        </ul>

        <button onclick="logout()" class="logout-btn">Logout</button>

        <!--SOCIALS-->
        <div class="social-icons">
          <a
            href="https://guthib.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <i class="bx bxl-github"></i>
          </a>

          <a href="#">
            <i class="bx bxl-facebook-square"></i>
          </a>

          <a href="#">
            <i class="bx bxl-instagram"></i>
          </a>

          <a href="#">
            <i class="bx bxl-tiktok"></i>
          </a>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">
        <!-- TOP BAR -->
        <header class="topbar">
          <h1>LICENSE SYSTEM</h1>
        </header>

        <div class="section-container">
          <!-- DASHBOARD -->
          <section id="dashboard" class="section active">
            <h2>Overview</h2>

            <div class="cards">
              <div class="stat-card">
                <h3>Total</h3>
                <p id="stat_total">0</p>
              </div>

              <div class="stat-card">
                <h3>Active</h3>
                <p id="stat_active">0</p>
              </div>

              <div class="stat-card">
                <h3>Banned</h3>
                <p id="stat_banned">0</p>
              </div>

              <div class="stat-card">
                <h3>Expired</h3>
                <p id="stat_expired">0</p>
              </div>
            </div>

            <button onclick="loadStats()">Refresh Stats</button>
          </section>

          <!-- KEYS -->
          <section id="keys" class="section">
            <h2>License Management</h2>

            <div class="grid">
              <!-- GENERATE OR MANUAL KEY -->
              <div class="card">
                <h3>Generate Key</h3>

                <input id="add_key" placeholder="Generate or enter key" />
                <input
                  id="add_days"
                  type="number"
                  placeholder="Days (e.g. 30)"
                />

                <button onclick="generateKey()">Generate</button>
                <button onclick="addKey()">Send to Database</button>
              </div>

              <!-- BAN / UNBAN -->
              <div class="card">
                <h3>Ban / Unban Key</h3>
                <input id="ban_key" placeholder="License Key" />
                <button onclick="ban()">Ban</button>
                <button onclick="unban()">Unban</button>
              </div>

              <!-- EXTEND -->
              <div class="card">
                <h3>Extend Key</h3>
                <input id="ext_key" placeholder="License Key" />
                <input id="ext_days" type="number" placeholder="Days" />
                <button onclick="extend()">Extend</button>
              </div>

              <!-- DELETE -->
              <div class="card">
                <h3>Delete Key</h3>
                <input id="del_key" placeholder="License Key" />
                <button onclick="del()">Delete</button>
              </div>
            </div>
          </section>
        </div>

        <!-- USERS -->
        <section id="users" class="section">
          <h2>ACTIVE LICENSES</h2>
          <button onclick="loadUsers()">Refresh</button>
          <div id="users_table"></div>
        </section>
      </main>
    </div>

    <!--scripts-->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cosmetics.js"></script>

    <script>
      function showSection(id) {
        document
          .querySelectorAll(".section")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(id).classList.add("active");
      }
    </script>

    <!--MESSAGE-->
    <div id="message"></div>
  </body>
</html>
